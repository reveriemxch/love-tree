<!DOCTYPE html>
<html lang="en">
<head>
    <title>A tree full of love !</title>
    <style> 
        body {
            background-color: #0d1f2d;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: monospace;
            color: #a8e6cf;
        }
        h1 {
            margin-top: 30px;
            font-size: 1.2rem;
            letter-spacing: 3px;
        }
        #tree {
            display: grid;
            grid-template-columns: repeat(7, 40px);
            grid-template-rows: repeat(9, 40px);
            margin-top: 60px;
        }
        .empty { background: transparent;}
        .green { background: #2d6a4f; }
        .green-light { background: #52b788; }
        .brown { background: #4a3728; }

        .leaf { 
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .leaf:hover {
            transform: scale(1.3);
            background: #74c69d;
        }
         #overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: #0d1f2ddd;
          align-items: center;
          justify-content: center;
          z-index: 10;
        }

        #notecard {
          background: #1a3a2a;
          border: 2px solid #52b788;
          padding: 40px;
          text-align: center;
          max-width: 340px;
          font-family: monospace;
          color: #a8e6cf;
          font-size: 1.1rem;
          line-height: 1.8;
        }

        #closeBtn {
          margin-top: 24px;
          background: transparent;
          border: 2px solid #52b788;
          color: #a8e6cf;
          font-family: monospace;
          padding: 8px 20px;
          cursor: pointer;
          font-size: 0.9rem;
        }

        #closeBtn:hover {
          background: #52b788;
          color: #0d1f2d;
        }
    

    </style>
    </head> 
    <body>
        <h1>Click a leaf... </h1>
    <div id="tree">
        <!-- row 1 - treetop -->
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="green-light leaf" id="leaf1">💚</div>
  <div class="green-light"></div>
  <div class="green-light"></div>
  <div class="empty"></div>
  <div class="empty"></div>

  <!-- row 2 -->
  <div class="empty"></div>
  <div class="green"></div>
  <div class="green-light"></div>
  <div class="green-light"></div>
  <div class="green-light"></div>
  <div class="green"></div>
  <div class="empty"></div>

  <!-- row 3 -->
  <div class="green"></div>
  <div class="green-light"></div>
  <div class="green"></div>
 <div class="green-light leaf" id="leaf2">💚</div>
  <div class="green"></div>
  <div class="green-light"></div>
  <div class="green"></div>

  <!-- row 4 -->
  <div class="green"></div>
  <div class="green-light"></div>
  <div class="green-light"></div>
  <div class="green"></div>
  <div class="green-light"></div>
  <div class="green-light"></div>
  <div class="green"></div>

  <!-- row 5 -->
  <div class="empty"></div>
  <div class="green"></div>
  <div class="green-light"></div>
  <div class="green-light"></div>
    <div class="green-light leaf" id="leaf3">💚</div>
  <div class="green"></div>
  <div class="empty"></div>

  <!-- row 6 - trunk starts -->
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="brown"></div>
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="empty"></div>

  <!-- row 7 -->
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="empty"></div>
  <div class="empty"></div>

  <!-- row 8 -->
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="empty"></div>
  <div class="empty"></div>

  <!-- row 9 - base -->
  <div class="empty"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="brown"></div>
  <div class="empty"></div>
    </div> 
    <div id="overlay">
    <div id="notecard">
    <p id="notetext"></p>
    <button id="closeBtn">close 🍃</button>
    </div>
    </div>
    <script> 
        const notes = {
            leaf1: "hello",
            leaf2:"testing",
            leaf3:"baby",
        };
        const overlay = document.getElementById('overlay');
        const notetext = document.getElementById("notetext");

     document.querySelectorAll(".leaf").forEach(leaf => {
    leaf.addEventListener("click", () => {
      notetext.textContent = notes[leaf.id];
      overlay.style.display = "flex";
    });
  });
  document.getElementById("closeBtn").addEventListener("click", () => {
    overlay.style.display = "none";
  });
    </script>
    </body>
    </html>
